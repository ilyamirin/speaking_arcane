  <text x="92" y="222" fill="#E6DDD4" font-family="Georgia, 'Times New Roman', serif" font-size="88">Три карты.</text>
  <text x="92" y="310" fill="#E6DDD4" font-family="Georgia, 'Times New Roman', serif" font-size="88">Их спор.</text>
  <text x="92" y="398" fill="#E6DDD4" font-family="Georgia, 'Times New Roman', serif" font-size="88">Мужской вывод,</text>
